name: Run codops

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Prompt to send to codops'
        required: true

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install -e .
      - name: Execute codops
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: codops run "${{ github.event.inputs.prompt }}"
